<html>
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
      rel="stylesheet"
    />

    <title>Menu</title>
    <!--Script necesario para poder abrir os frames separados-->
    <script>
      function abrirPaginas(conteudo, descricao) {
        parent.frames["conteudo"].location = conteudo;
        parent.frames["descricao"].location = descricao;
      }
    </script>
  </head>

  <body bgcolor="#FFFFFF" text="black" link="#66CCFF" vlink="#66CCFF">
    <center>
      <br />
      <br />
      <p style="font-family: Poppins; font-size: 15px; margin-top: 10px">
        Desenvolvimento Web
      </p>
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          flex-direction: column;
        "
      >
        <img
          src="images/html.png"
          width="60"
          style="margin-top: 5px; cursor: pointer"
          onclick="abrirPaginas('https://onecompiler.com/html', 'descricao.html')"
        />
        <br>

        <img
          src="images/javascript.png"
          width="60"
          style="margin-top: 5px; cursor: pointer"
          onclick="abrirPaginas('https://onecompiler.com/javascript', 'descricao2.html')"
        />
        <br>

        <img
          src="images/react.png"
          width="60"
          style="margin-top: 5px; cursor: pointer"
          onclick="abrirPaginas('https://onecompiler.com/react', 'descricao3.html')"
        />
        <br>
      </div>


      <br />
      <p style="font-family: Poppins; font-size: 15px; margin-top: 10px">
        Desenvolvimento Back-End
      </p>
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          flex-direction: column;
        "
      >
        <!--Codigo para que quando clique no link abra dois ao mesmo tempo no frame-->
        <img
          src="images/c.png"
          width="60"
          style="margin-top: 5px; cursor: pointer"
          onclick="abrirPaginas('https://onecompiler.com/c', 'descricao4.html')"
        />
        <br>

         <img
          src="images/csharp.png"
          width="60"
          style="margin-top: 5px; cursor: pointer"
          onclick="abrirPaginas('https://onecompiler.com/csharp', 'descricao5.html')"
        />
        <br>

        <img
          src="images/c++.png"
          width="60"
          style="margin-top: 5px; cursor: pointer"
          onclick="abrirPaginas('https://onecompiler.com/cpp', 'descricao6.html')"
        />
        <br>

      </div>
    </center>
  </body>
</html>
